version: '3.9'

services:
  cftv-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cftv-dashboard
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - INTERVAL=${INTERVAL:-2.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - cftv-net
    labels:
      - "com.cftv.service=dashboard"

networks:
  cftv-net:
    driver: bridge
